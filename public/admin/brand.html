<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKSLAB - Brands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="admin-modal.css">

    <link rel="stylesheet" href="admin-sidebar.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary-blue: #3b82f6;
            --primary-bg: #f8f9fa;
            --white: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --border-color: #e5e7eb;
            --danger-red: #ef4444;
            --warning-orange: #f59e0b;
            --success-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            margin-left: 260px;
            padding: 2rem;
            transition: margin-left 0.3s;
        }

        @media (max-width: 1199px) {
            .main-content {
                margin-left: 0;
            }
        }

        .content-wrapper {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Page Header */
        .page-header-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        /* Card Container */
        .brands-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .card-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-container {
            position: relative;
            width: 280px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-gray);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            /* Space for icon */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .add-btn {
            background-color: var(--primary-blue);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .add-btn:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #f3f4f6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
            font-size: 0.9rem;
            min-width: 800px;
        }

        thead th {
            text-align: left;
            padding: 1rem 1.5rem;
            background-color: #f9fafb;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        tbody td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            color: #374151;
            font-weight: 500;
            border-bottom: 1px solid #f3f4f6;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background-color: #f9fafb;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1;
        }

        .status-active {
            background-color: #ecfdf5;
            color: #10b981;
        }

        /* Action Buttons */
        .action-group {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .btn-edit {
            background-color: #fffbeb;
            color: #f59e0b;
        }

        .btn-edit:hover {
            background-color: #fef3c7;
            border-color: #fcd34d;
        }

        .btn-delete {
            background-color: #fef2f2;
            color: #ef4444;
        }

        .btn-delete:hover {
            background-color: #fee2e2;
            border-color: #fca5a5;
        }

        .icon-sm {
            width: 18px;
            height: 18px;
        }

        /* Brand Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            /* Slightly lighter backdrop */
            backdrop-filter: blur(2px);
            z-index: 9999 !important;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease-out;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: var(--white);
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            padding-bottom: 2rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-gray);
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 0 2rem 1rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-top: 6px;
            margin-bottom: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #374151;
            margin-bottom: 4px;
            display: block;
            text-align: left;
            width: 100%;
        }

        .details-list {
            width: 100%;
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            font-size: 0.95rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-gray);
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-dark);
        }

        .detail-value.status-active {
            color: var(--success-green);
        }

        .modal-footer {
            padding: 0 2rem;
            text-align: right;
            width: 100%;
        }

        .btn-modal-close {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-modal-close:hover {
            background-color: #2563eb;
        }

        /* Responsive */
        @media (max-width: 991px) {
            .main-content {
                margin-left: 0;
            }
        }

        @media (max-width: 768px) {
            .card-header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .card-title {
                text-align: center;
                margin-bottom: 0.5rem;
            }

            .card-actions {
                flex-direction: column;
                width: 100%;
                gap: 1rem;
            }

            .search-container {
                width: 100%;
            }

            .search-input {
                width: 100%;
            }

            .add-btn {
                width: 100%;
                justify-content: center;
            }

            .brands-card {
                padding: 1rem;
                margin-top: 1rem;
            }

            .table-responsive {
                box-shadow: none;
                border: 1px solid #eee;
            }

            tbody td {
                padding: 0.75rem;
                font-size: 0.85rem;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
                margin: 1rem;
            }
        }

        /* Pagination Styles */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color, #e5e7eb);
        }

        .pagination-info {
            color: var(--text-gray, #6b7280);
            font-size: 0.9rem;
        }

        .pagination-controls {
            display: flex;
            gap: 0.5rem;
        }

        .page-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color, #e5e7eb);
            background-color: #fff;
            color: var(--text-gray, #6b7280);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .page-btn:hover {
            border-color: var(--primary-blue, #3b82f6);
            color: var(--primary-blue, #3b82f6);
        }

        .page-btn.active {
            background-color: var(--primary-blue, #3b82f6);
            color: #fff;
            border-color: var(--primary-blue, #3b82f6);
        }

        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>

    <script>
        const API_URL = "/api/admin/brands";
        let brandsData = [];
        let currentPage = 1;

        document.addEventListener("DOMContentLoaded", () => fetchBrands(1));

        async function fetchBrands(page = 1, searchQuery = '') {
            try {
                const searchInput = document.getElementById("searchInput");
                const search = searchQuery || (searchInput ? searchInput.value : '');

                const res = await fetch(`${API_URL}?page=${page}&limit=20&search=${encodeURIComponent(search)}`);
                
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/user/login.html';
                    return;
                }

                if (!res.ok) throw new Error("Failed to fetch");

                const responseData = await res.json();

                if (responseData.success) {
                    brandsData = responseData.data || responseData.brands;
                    renderBrands(brandsData);
                    renderPagination(responseData.totalRecords || brandsData.length, responseData.totalPages || 1, responseData.currentPage || 1);
                } else if (Array.isArray(responseData)) {
                    brandsData = responseData;
                    renderBrands(brandsData);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderPagination(totalRecords, totalPages, currentPageNum) {
            currentPage = currentPageNum;
            const paginationInfo = document.getElementById('pagination-info');
            const paginationControls = document.getElementById('pagination-controls');

            if (!paginationInfo || !paginationControls) return;

            const limit = 20;
            const startRecord = totalRecords === 0 ? 0 : ((currentPage - 1) * limit) + 1;
            const endRecord = Math.min(currentPage * limit, totalRecords);

            paginationInfo.textContent = `Showing ${startRecord}–${endRecord} of ${totalRecords} brands`;

            let controlsHtml = '';

            controlsHtml += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" onclick="${currentPage === 1 ? 'return false;' : `fetchBrands(${currentPage - 1})`}">« Prev</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (totalPages > 7) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                        controlsHtml += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="fetchBrands(${i})">${i}</button>`;
                    } else if (i === currentPage - 2 || i === currentPage + 2) {
                        controlsHtml += `<span style="margin: 0 5px; align-self: center;">...</span>`;
                    }
                } else {
                    controlsHtml += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="fetchBrands(${i})">${i}</button>`;
                }
            }

            controlsHtml += `<button class="page-btn ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}" onclick="${currentPage === totalPages || totalPages === 0 ? 'return false;' : `fetchBrands(${currentPage + 1})`}">Next »</button>`;

            paginationControls.innerHTML = controlsHtml;
        }

        function renderBrands(brands) {
            const tbody = document.getElementById("brandTable");
            tbody.innerHTML = "";

            brands.forEach(brand => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <div class="brand-info">
                            <span class="brand-name">${brand.name}</span>
                        </div>
                    </td>
                    <td>${brand.description || '-'}</td>
                    <td>${brand.productCount || 0}</td>
                    <td><span class="status-badge ${brand.status === 'Active' ? 'status-active' : ''}" style="${brand.status !== 'Active' ? 'background:#fee2e2;color:#ef4444;' : ''}">${brand.status}</span></td>
                    <td>
                        <div class="action-group">
                            <button class="action-btn btn-edit" onclick="openEditModal('${brand._id}')">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteBrand('${brand._id}')">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            if (brands.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:20px;'>No brands found.</td></tr>";
            }
        }

        function openAddModal() {
            document.getElementById("addBrandModal").classList.add("active");
        }
        function closeAddModal() {
            document.getElementById("addBrandModal").classList.remove("active");
            document.getElementById("brandName").value = "";
            document.getElementById("brandDesc").value = "";
        }

        async function addBrand() {
            const name = document.getElementById("brandName").value.trim();
            const description = document.getElementById("brandDesc").value.trim();
            const status = document.getElementById("brandStatus").value;

            if (!name) return AdminModal.alert("Brand Name is required", "error");

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, description, status })
                });

                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/user/login.html';
                    return;
                }

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Failed to create");

                closeAddModal();
                fetchBrands();
                await AdminModal.alert("Brand created successfully!", "success");
            } catch (err) {
                console.error(err);
                AdminModal.alert(err.message || "Error creating brand", "error");
            }
        }

        function openEditModal(id) {
            const brand = brandsData.find(b => b._id === id);
            if (!brand) return;

            document.getElementById("editBrandId").value = brand._id;
            document.getElementById("editBrandName").value = brand.name;
            document.getElementById("editBrandDesc").value = brand.description || "";
            document.getElementById("editBrandStatus").value = brand.status;

            document.getElementById("editBrandModal").classList.add("active");
        }
        function closeEditModal() {
            document.getElementById("editBrandModal").classList.remove("active");
        }

        async function updateBrand() {
            const id = document.getElementById("editBrandId").value;
            const name = document.getElementById("editBrandName").value.trim();
            const description = document.getElementById("editBrandDesc").value.trim();
            const status = document.getElementById("editBrandStatus").value;

            if (!name) return AdminModal.alert("Brand Name is required", "error");

            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, description, status })
                });

                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/user/login.html';
                    return;
                }

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Failed to update");

                closeEditModal();
                fetchBrands();
                await AdminModal.alert("Brand updated successfully!", "success");
            } catch (err) {
                console.error(err);
                AdminModal.alert(err.message || "Error updating brand", "error");
            }
        }

        async function deleteBrand(id) {
            if (await AdminModal.confirm("Are you sure you want to delete this brand? This action cannot be undone.")) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, {
                        method: "DELETE"
                    });

                    if (res.status === 401 || res.status === 403) {
                        window.location.href = '/user/login.html';
                        return;
                    }

                    if (!res.ok) throw new Error("Failed to delete");

                    fetchBrands();
                    await AdminModal.alert("Brand deleted successfully!", "success");
                } catch (err) {
                    console.error(err);
                    AdminModal.alert("Error deleting brand", "error");
                }
            }
        }

        let searchDebounceTimer;
        document.getElementById("searchInput").addEventListener("input", function (e) {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                currentPage = 1;
                fetchBrands(currentPage, e.target.value);
            }, 400);
        });
    </script>
    <script src="admin-inactivity.js"></script>
</body>

</html>
