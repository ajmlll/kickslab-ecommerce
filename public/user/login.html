<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KICKSLAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');

        /* --- Global Variables (Synced) --- */
        :root {
            --color-black: #000000;
            --color-dark: #121212;
            --color-white: #ffffff;
            --color-accent: #4285F4;
            --color-grey-bg: #F4F4F4;
            --color-grey-light: #E0E0E0;
            --color-text-muted: #666666;
            --color-badge-new: #4285F4;
            --color-badge-sale: #FFC107;

            --bg-body: var(--color-grey-bg);
            --bg-card: var(--color-white);
            --bg-nav: var(--color-white);
            --bg-footer: var(--color-dark);

            --text-main: var(--color-black);
            --text-muted: var(--color-text-muted);

            --border-color: var(--color-grey-light);
            --shadow-color: rgba(0, 0, 0, 0.05);

            --font-body: 'Inter', sans-serif;
            --font-heading: 'Oswald', sans-serif;

            --border-radius-sm: 4px;
            --border-radius-md: 8px;
            --container-width: 1280px;
            --spacing-md: 16px;
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-main);
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        ul {
            list-style: none;
        }

        /* Utilities */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .font-heading {
            font-family: var(--font-heading);
        }

        .flex {
            display: flex;
        }

        .align-center {
            align-items: center;
        }

        .justify-end {
            justify-content: flex-end;
        }

        .justify-between {
            justify-content: space-between;
        }

        /* Navbar Styles (Synced) */
        .navbar {
            background-color: var(--bg-nav);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-left,
        .nav-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .nav-left {
            gap: 15px;
            justify-content: flex-start;
        }

        .nav-right {
            justify-content: flex-end;
        }

        .nav-center {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .navbar .logo {
            font-size: 32px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -1px;
            color: var(--text-main);
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.5px;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .nav-icons {
            gap: 20px;
            font-size: 18px;
            color: var(--text-main);
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 5px 25px 5px 0;
            font-family: inherit;
            width: 180px;
            background: transparent;
            color: var(--text-main);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-accent);
            width: 220px;
        }

        .search-box .fa-search {
            position: absolute;
            right: 0;
            font-size: 14px;
            pointer-events: none;
        }

        /* Mobile Menu Styles (Synced) */
        .mobile-menu-btn {
            display: none;
            font-size: 24px;
            color: var(--text-main);
        }

        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
        }

        .mobile-menu-overlay.active {
            display: block;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-nav);
            z-index: 1002;
            transition: 0.3s;
            padding: 20px;
            border-right: 1px solid var(--border-color);
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-menu-header {
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .mobile-nav-links li {
            margin-bottom: 20px;
        }

        .mobile-nav-links a {
            font-weight: 600;
            font-size: 16px;
            display: block;
            color: var(--text-main);
        }

        .close-menu-btn {
            font-size: 24px;
        }

        /* --- AUTH PAGE REDESIGN (Split Layout) --- */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .auth-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            min-height: 600px;
            animation: fadeIn 0.6s ease-out;
        }

        .auth-form-side {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .auth-image-side {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2012&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 40px;
        }

        .auth-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .auth-image-text {
            position: relative;
            color: white;
            z-index: 2;
            text-align: center;
        }

        .auth-image-text h3 {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .auth-image-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .auth-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .forgot-link {
            color: var(--color-accent);
            font-weight: 500;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: var(--color-black);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            font-size: 14px;
            text-transform: uppercase;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .btn-auth:hover {
            background-color: #333;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background-color: #eee;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-google:hover {
            background-color: #f9f9f9;
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
        }

        .auth-footer a {
            color: var(--color-accent);
            font-weight: 600;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer (Synced) */
        footer {
            background-color: var(--bg-footer);
            color: var(--color-white);
            padding: 60px 0 20px 0;
            position: relative;
            overflow: hidden;
            border-radius: 30px 30px 0 0;
            margin-top: auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 30px;
        }

        .footer-col h4 {
            color: #f59e0b;
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .footer-col p,
        .footer-col a {
            font-size: 13px;
            line-height: 2;
            color: #cccccc;
            display: block;
        }

        .footer-socials {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .footer-socials a {
            color: #ffffff;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .footer-socials a:hover {
            color: var(--color-accent);
        }

        .footer-large-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-heading);
            font-size: 150px;
            font-style: italic;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 1024px) {

            .nav-links,
            .search-box input {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .search-box .fa-search {
                position: static;
                pointer-events: auto;
                font-size: 20px;
                margin-left: 5px;
            }
        }

        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .footer-socials {
                justify-content: center;
            }

            .footer-large-text {
                font-size: 100px;
                bottom: -20px;
            }

            /* Auth Mobile Stack */
            .auth-container {
                flex-direction: column-reverse;
                max-width: 450px;
                min-height: auto;
            }

            .auth-image-side {
                height: 150px;
                padding: 20px;
                flex: none;
            }

            .auth-image-text h3 {
                font-size: 20px;
            }

            .auth-image-text p {
                display: none;
            }

            .auth-form-side {
                padding: 30px 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="../admin/admin-modal.css">
</head>

<body>

    <!-- Auth Content -->
    <main class="auth-wrapper">
        <div class="auth-container">
            <!-- Form Side -->
            <div class="auth-form-side">
                <h1 class="auth-title">WELCOME BACK</h1>
                <p class="auth-subtitle">Please enter your details to sign in.</p>

                <div class="error-message" id="loginError">Invalid email or password.</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" autocomplete="username" class="form-input" id="email"
                            placeholder="Enter your email" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" autocomplete="current-password" class="form-input"
                            id="password" placeholder="••••••••" required style="padding-right: 45px;">
                        <i class="fas fa-eye" id="togglePassword"
                            style="position: absolute; right: 15px; top: 40px; cursor: pointer; color: var(--text-muted);"></i>
                    </div>

                    <div class="auth-actions-row">
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-auth">Sign In</button>
                </form>

                <div class="divider">OR CONTINUE WITH</div>

                <a href="/auth/google" class="btn-google" style="text-decoration: none;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"
                        alt="Google">
                    Sign in with Google
                </a>

                <p class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>
            </div>

            <!-- Image Side -->
            <div class="auth-image-side">
                <div class="auth-image-overlay"></div>
                <div class="auth-image-text">
                    <h3>Premium Comfort</h3>
                    <p>Experience the future of footwear with our exclusive collection.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Admin Modal -->
    <script src="../admin/admin-modal-helper.js"></script>
    <div id="admin-modal-root"></div>

    <script>
        // ✅ Handle Remember Me Persistence on Page Load
        window.addEventListener('DOMContentLoaded', () => {
            // Fill last used email (purely for UX)
            const lastLoginEmail = localStorage.getItem('lastLoginEmail');
            if (lastLoginEmail) {
                document.querySelector("#email").value = lastLoginEmail;
            }

            // Show Google suggestion if they previously used it
            const lastMethod = localStorage.getItem('lastLoginMethod');
            if (lastMethod === 'google') {
                const googleBtn = document.querySelector('.btn-google');
                if (googleBtn) {
                    const suggestion = document.createElement('div');
                    suggestion.style.textAlign = 'center';
                    suggestion.style.color = 'var(--text-muted)';
                    suggestion.style.fontSize = '12px';
                    suggestion.style.marginTop = '10px';
                    suggestion.textContent = 'You previously used Google to sign in. Continue with Google?';
                    googleBtn.parentNode.insertBefore(suggestion, googleBtn.nextSibling);
                }
            }

            // Bind Google Button intercept to send rememberMe state
            const btnGoogle = document.querySelector('.btn-google');
            if (btnGoogle) {
                btnGoogle.addEventListener('click', (e) => {
                    e.preventDefault();
                    const rememberMe = document.querySelector("#rememberMe")?.checked || false;
                    localStorage.setItem('lastLoginMethod', 'google');
                    window.location.href = `/auth/google?remember=${rememberMe}`;
                });
            }

            // Check for session expired parameter
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('expired') === 'true') {
                const errorBox = document.getElementById('loginError');
                if (errorBox) {
                    errorBox.textContent = "Session expired due to inactivity. Please login again.";
                    errorBox.style.display = 'block';
                }
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });

        // Password Visibility Toggle
        const togglePassword = document.querySelector("#togglePassword");
        const passwordField = document.querySelector("#password");

        if (togglePassword) {
            togglePassword.addEventListener("click", function () {
                const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
                passwordField.setAttribute("type", type);
                this.classList.toggle("fa-eye");
                this.classList.toggle("fa-eye-slash");
            });
        }

        // Check for URL errors
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'google_failed') {
            AdminModal.alert("Google login failed. Please try again.", "error");
        }

        document.querySelector("#loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.querySelector("#email").value.trim();
            const password = document.querySelector("#password").value.trim();
            const rememberMe = document.querySelector("#rememberMe")?.checked || false;

            try {
                const res = await fetch("/api/users/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({ email, password, rememberMe })
                });

                const data = await res.json();

                if (!data.success) {
                    AdminModal.alert(data.message || "Login failed", "error");
                    return;
                }

                // ✅ Set Auth State for Frontend
                localStorage.setItem('isLoggedIn', 'true');
                if (data.user) {
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    if (data.role === 'admin') {
                        localStorage.setItem('adminData', JSON.stringify(data.user));
                    }
                }

                // ✅ LOG LOGIN PREFERENCES
                localStorage.setItem('lastLoginMethod', 'email');
                localStorage.setItem('lastLoginEmail', email);
                localStorage.removeItem('rememberedEmail'); // clean up legacy variable

                if (data.role === "admin") {
                    window.location.href = "/admin/dashboard.html";
                } else {
                    window.location.href = "/user/Landingpage.html";
                }

            } catch (err) {
                console.error("Login error:", err);
                AdminModal.alert("Something went wrong", "error");
            }
        });
    </script>
</body>

</html>
