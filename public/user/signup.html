<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - KICKSLAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="user-auth-helper.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');

        /* --- Global Variables (Synced) --- */
        :root {
            --color-black: #000000;
            --color-dark: #121212;
            --color-white: #ffffff;
            --color-accent: #4285F4;
            --color-grey-bg: #F4F4F4;
            --color-grey-light: #E0E0E0;
            --color-text-muted: #666666;

            --bg-body: var(--color-grey-bg);
            --bg-card: var(--color-white);
            --bg-nav: var(--color-white);
            --bg-footer: var(--color-dark);

            --text-main: var(--color-black);
            --text-muted: var(--color-text-muted);

            --border-color: var(--color-grey-light);
            --font-body: 'Inter', sans-serif;
            --font-heading: 'Oswald', sans-serif;

            --border-radius-sm: 4px;
            --border-radius-md: 8px;
            --container-width: 1280px;
            --spacing-md: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-main);
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .font-heading {
            font-family: var(--font-heading);
        }

        .flex {
            display: flex;
        }

        .align-center {
            align-items: center;
        }

        .justify-end {
            justify-content: flex-end;
        }

        .justify-between {
            justify-content: space-between;
        }

        /* Navbar Styles (Synced) */
        .navbar {
            background-color: var(--bg-nav);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-left,
        .nav-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .nav-left {
            gap: 15px;
            justify-content: flex-start;
        }

        .nav-right {
            justify-content: flex-end;
        }

        .nav-center {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .navbar .logo {
            font-size: 32px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -1px;
            color: var(--text-main);
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.5px;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .nav-icons {
            gap: 20px;
            font-size: 18px;
            color: var(--text-main);
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 5px 25px 5px 0;
            font-family: inherit;
            width: 180px;
            background: transparent;
            color: var(--text-main);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-accent);
            width: 220px;
        }

        .search-box .fa-search {
            position: absolute;
            right: 0;
            font-size: 14px;
            pointer-events: none;
        }

        /* Mobile Menu */
        /* Mobile Menu Removed (Handled by user-auth-helper.js) */
        .mobile-menu-btn {
            display: none;
        }


        /* --- AUTH REDESIGN (Split Layout) --- */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .auth-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            min-height: 600px;
            animation: fadeIn 0.6s ease-out;
        }

        .auth-form-side {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-image-side {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1512374382149-233c42b6a83b?q=80&w=2535&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 40px;
        }

        .auth-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .auth-image-text {
            position: relative;
            color: white;
            z-index: 2;
            text-align: center;
        }

        .auth-image-text h3 {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .auth-image-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: var(--color-black);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            font-size: 14px;
            text-transform: uppercase;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .btn-auth:hover {
            background-color: #333;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background-color: #eee;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            text-decoration: none;
            color: #333;
        }

        .btn-google:hover {
            background-color: #f9f9f9;
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
        }

        .auth-footer a {
            color: var(--color-accent);
            font-weight: 600;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 40px;
            cursor: pointer;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer (Synced) */
        footer {
            background-color: var(--bg-footer);
            color: var(--color-white);
            padding: 60px 0 20px 0;
            position: relative;
            overflow: hidden;
            border-radius: 30px 30px 0 0;
            margin-top: auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 30px;
        }

        .footer-col h4 {
            color: #f59e0b;
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .footer-col p,
        .footer-col a {
            font-size: 13px;
            line-height: 2;
            color: #cccccc;
            display: block;
        }

        .footer-socials {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .footer-socials a {
            color: #ffffff;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .footer-socials a:hover {
            color: var(--color-accent);
        }

        .footer-large-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-heading);
            font-size: 150px;
            font-style: italic;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 1024px) {
            .nav-links,
            .search-box input {
                display: none;
            }

            /* Mobile Menu Button handled by user-auth-helper.js */
            .mobile-menu-btn {
                display: none;
            }

            .search-box .fa-search {
                position: static;
                pointer-events: auto;
                font-size: 20px;
                margin-left: 5px;
            }
        }

        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .footer-socials {
                justify-content: center;
            }

            .footer-large-text {
                font-size: 100px;
                bottom: -20px;
            }

            /* Auth Mobile */
            .auth-container {
                flex-direction: column-reverse;
                max-width: 450px;
            }

            .auth-image-side {
                height: 150px;
                padding: 20px;
                flex: none;
            }

            .auth-image-text h3 {
                font-size: 20px;
            }

            .auth-image-text p {
                display: none;
            }

            .auth-form-side {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <main class="auth-wrapper">
        <div class="auth-container">
            <!-- Form Side -->
            <div class="auth-form-side">
                <h1 class="auth-title">CREATE ACCOUNT</h1>
                <p class="auth-subtitle">Join us to get exclusive drops and offers.</p>

                <div class="error-message" id="signupError"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="fullname" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="password" placeholder="Min 8 characters" required
                            style="padding-right: 45px;">
                        <i class="fas fa-eye password-toggle" onclick="togglePass('password', this)"></i>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password"
                            required style="padding-right: 45px;">
                        <i class="fas fa-eye password-toggle" onclick="togglePass('confirmPassword', this)"></i>
                    </div>

                    <button type="submit" class="btn-auth">Create Account</button>
                </form>

                <div class="divider">OR SIGN UP WITH</div>

                <a href="/auth/google" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"
                        alt="Google">
                    Sign up with Google
                </a>

                <p class="auth-footer">
                    Already have an account? <a href="login.html">Log in</a>
                </p>
            </div>

            <!-- Image Side -->
            <div class="auth-image-side">
                <div class="auth-image-overlay"></div>
                <div class="auth-image-text">
                    <h3>Join the Movement</h3>
                    <p>Be the first to know about new drops and exclusive events.</p>
                </div>
            </div>
        </div>
    </main>
    <script src="user-auth-helper.js"></script>
    <script>
        // AuthSystem.init() is now handled centrally by user-auth-helper.js

        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            if (password.length < 8) {
                alert("Password must be at least 8 characters");
                return;
            }

            const errorBox = document.getElementById("signupError");
            errorBox.style.display = "none";

            try {
                const res = await fetch("/api/users/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem("verifyEmail", email);
                    localStorage.setItem("otpPurpose", "signup");
                    window.location.href = "/user/otp-verification.html";
                } else {
                    errorBox.innerText = data.message || "Signup failed";
                    errorBox.style.display = "block";
                }
            } catch (err) {
                console.error(err);
                errorBox.innerText = "Something went wrong. Please try again.";
                errorBox.style.display = "block";
            }
        });
    </script>
</body>

</html>
