<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - KICKSLAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');

        /* --- Global Variables (Synced) --- */
        :root {
            --color-black: #000000;
            --color-dark: #121212;
            --color-white: #ffffff;
            --color-accent: #4285F4;
            --color-grey-bg: #F4F4F4;
            --color-grey-light: #E0E0E0;
            --color-text-muted: #666666;

            --bg-body: var(--color-grey-bg);
            --bg-card: var(--color-white);
            --bg-nav: var(--color-white);
            --bg-footer: var(--color-dark);

            --text-main: var(--color-black);
            --text-muted: var(--color-text-muted);

            --border-color: var(--color-grey-light);
            --font-body: 'Inter', sans-serif;
            --font-heading: 'Oswald', sans-serif;

            --border-radius-sm: 4px;
            --border-radius-md: 8px;
            --container-width: 1280px;
            --spacing-md: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        ul {
            list-style: none;
        }

        /* Utilities */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .font-heading {
            font-family: var(--font-heading);
        }

        .flex {
            display: flex;
        }

        .align-center {
            align-items: center;
        }

        .justify-end {
            justify-content: flex-end;
        }

        .justify-between {
            justify-content: space-between;
        }

        /* Navbar */
        .navbar {
            background-color: var(--bg-nav);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-left,
        .nav-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .nav-left {
            gap: 15px;
            justify-content: flex-start;
        }

        .nav-right {
            justify-content: flex-end;
        }

        .nav-center {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .navbar .logo {
            font-size: 32px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -1px;
            color: var(--text-main);
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.5px;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .nav-icons {
            gap: 20px;
            font-size: 18px;
            color: var(--text-main);
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 5px 25px 5px 0;
            font-family: inherit;
            width: 180px;
            background: transparent;
            color: var(--text-main);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-accent);
            width: 220px;
        }

        .search-box .fa-search {
            position: absolute;
            right: 0;
            font-size: 14px;
            pointer-events: none;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            font-size: 24px;
            color: var(--text-main);
        }

        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
        }

        .mobile-menu-overlay.active {
            display: block;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-nav);
            z-index: 1002;
            transition: 0.3s;
            padding: 20px;
            border-right: 1px solid var(--border-color);
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-menu-header {
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .mobile-nav-links li {
            margin-bottom: 20px;
        }

        .mobile-nav-links a {
            font-weight: 600;
            font-size: 16px;
            display: block;
            color: var(--text-main);
        }

        .close-menu-btn {
            font-size: 24px;
        }

        /* --- AUTH REDESIGN (Split Layout) --- */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .auth-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            min-height: 500px;
            animation: fadeIn 0.6s ease-out;
        }

        .auth-form-side {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-image-side {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1614064641938-3bcee52636c4?q=80&w=2671&auto=format&fit=crop');
            /* Security abstraction */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 40px;
        }

        .auth-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        }

        .auth-image-text {
            position: relative;
            color: white;
            z-index: 2;
            text-align: center;
        }

        .auth-image-text h3 {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .auth-image-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            /* Right padding for visibility icon */
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 38px;
            color: #999;
            cursor: pointer;
            font-size: 14px;
        }

        .password-toggle:hover {
            color: #555;
        }

        /* Strength Meter */
        .strength-meter {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            display: flex;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-text {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: var(--color-black);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-auth:hover {
            background: #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer */
        footer {
            background-color: var(--bg-footer);
            color: var(--color-white);
            padding: 60px 0 20px 0;
            position: relative;
            overflow: hidden;
            border-radius: 30px 30px 0 0;
            margin-top: auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 30px;
        }

        .footer-col h4 {
            color: #f59e0b;
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .footer-col p,
        .footer-col a {
            font-size: 13px;
            line-height: 2;
            color: #cccccc;
            display: block;
        }

        .footer-socials {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .footer-socials a {
            color: #ffffff;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .footer-socials a:hover {
            color: var(--color-accent);
        }

        .footer-large-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-heading);
            font-size: 150px;
            font-style: italic;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 1024px) {

            .nav-links,
            .search-box input {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .search-box .fa-search {
                position: static;
                pointer-events: auto;
                font-size: 20px;
                margin-left: 5px;
            }
        }

        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .footer-socials {
                justify-content: center;
            }

            .footer-large-text {
                font-size: 100px;
                bottom: -20px;
            }

            /* Auth Mobile */
            .auth-container {
                flex-direction: column-reverse;
                max-width: 450px;
                min-height: auto;
            }

            .auth-image-side {
                height: 150px;
                padding: 20px;
                flex: none;
            }

            .auth-image-text h3 {
                font-size: 20px;
            }

            .auth-image-text p {
                display: none;
            }

            .auth-form-side {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    

    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay"></div>
    <div class="mobile-menu">
        <div class="mobile-menu-header flex justify-between align-center">
            <span class="logo font-heading">KICKSLAB</span>
            <button class="close-menu-btn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="Landingpage.html">Home</a></li>
            <li><a href="ProductListing.html">Shop</a></li>
            <li><a href="AboutPage.html">About</a></li>
            <li><a href="Contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </div>

    <main class="auth-wrapper">
        <div class="auth-container">
            <!-- Form Side -->
            <div class="auth-form-side">
                <div class="icon-circle"
                    style="background: #e3f2fd; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; color: var(--color-accent); font-size: 24px;">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="auth-title" style="text-align: center;">RESET PASSWORD</h1>
                <p class="auth-subtitle" style="text-align: center;">Create a strong password to secure your account.
                </p>

                <form id="resetForm">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-input" id="newPassword" placeholder="Min 8 characters"
                            required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>
                        <div class="strength-meter">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Password Strength</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password"
                            required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>

                    <button type="submit" class="btn-auth">Reset Password</button>
                </form>
            </div>

            <!-- Image Side -->
            <div class="auth-image-side">
                <div class="auth-image-overlay"></div>
                <div class="auth-image-text">
                    <h3>Unbreakable Security</h3>
                    <p>Your privacy is our mission. Stay safe with robust protection.</p>
                </div>
            </div>
        </div>
    </main>

    
  <script>

/* ================= PASSWORD TOGGLE ================= */
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

/* ================= STRENGTH METER ================= */
const newPassInput = document.getElementById("newPassword");
const strengthBar = document.getElementById("strengthBar");
const strengthText = document.getElementById("strengthText");

newPassInput.addEventListener("input", () => {
    const val = newPassInput.value;
    let strength = 0;

    if (val.length >= 8) strength += 25;
    if (/[A-Z]/.test(val)) strength += 25;
    if (/[0-9]/.test(val)) strength += 25;
    if (/[^A-Za-z0-9]/.test(val)) strength += 25;

    strengthBar.style.width = strength + "%";

    if (strength <= 25) {
        strengthBar.style.background = "#d32f2f";
        strengthText.innerText = "Weak";
    } else if (strength <= 50) {
        strengthBar.style.background = "#ff9800";
        strengthText.innerText = "Medium";
    } else if (strength <= 75) {
        strengthBar.style.background = "#ffeb3b";
        strengthText.innerText = "Good";
    } else {
        strengthBar.style.background = "#4caf50";
        strengthText.innerText = "Strong";
    }
});

/* ================= RESET PASSWORD ================= */
document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const pass = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const btn = e.target.querySelector("button");

    if (pass !== confirm) {
        alert("Passwords do not match");
        return;
    }

    if (pass.length < 8) {
        alert("Password must be at least 8 characters");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Updating...";

    try {
const res = await fetch("/api/users/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include", // IMPORTANT for cookies
            body: JSON.stringify({ newPassword: pass })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.message || "Unauthorized or expired session");
            btn.disabled = false;
            btn.innerText = "Reset Password";
            return;
        }

        alert("Password reset successful. Please login.");
        window.location.href = "login.html";

    } catch (err) {
        alert("Something went wrong");
        btn.disabled = false;
        btn.innerText = "Reset Password";
    }
});

</script>


</body>

</html>
