<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - KICKSLAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');

        /* --- Global Variables (Synced) --- */
        :root {
            --color-black: #000000;
            --color-dark: #121212;
            --color-white: #ffffff;
            --color-accent: #4285F4;
            --color-grey-bg: #F4F4F4;
            --color-grey-light: #E0E0E0;
            --color-text-muted: #666666;

            --bg-body: var(--color-grey-bg);
            --bg-card: var(--color-white);
            --bg-nav: var(--color-white);
            --bg-footer: var(--color-dark);

            --text-main: var(--color-black);
            --text-muted: var(--color-text-muted);

            --border-color: var(--color-grey-light);
            --font-body: 'Inter', sans-serif;
            --font-heading: 'Oswald', sans-serif;

            --border-radius-sm: 4px;
            --border-radius-md: 8px;
            --container-width: 1280px;
            --spacing-md: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        ul {
            list-style: none;
        }

        /* Utilities */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .font-heading {
            font-family: var(--font-heading);
        }

        .flex {
            display: flex;
        }

        .align-center {
            align-items: center;
        }

        .justify-end {
            justify-content: flex-end;
        }

        .justify-between {
            justify-content: space-between;
        }

        /* Navbar */
        .navbar {
            background-color: var(--bg-nav);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-left,
        .nav-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .nav-left {
            gap: 15px;
            justify-content: flex-start;
        }

        .nav-right {
            justify-content: flex-end;
        }

        .nav-center {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .navbar .logo {
            font-size: 32px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -1px;
            color: var(--text-main);
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.5px;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .nav-icons {
            gap: 20px;
            font-size: 18px;
            color: var(--text-main);
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 5px 25px 5px 0;
            font-family: inherit;
            width: 180px;
            background: transparent;
            color: var(--text-main);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-accent);
            width: 220px;
        }

        .search-box .fa-search {
            position: absolute;
            right: 0;
            font-size: 14px;
            pointer-events: none;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            font-size: 24px;
            color: var(--text-main);
        }

        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
        }

        .mobile-menu-overlay.active {
            display: block;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-nav);
            z-index: 1002;
            transition: 0.3s;
            padding: 20px;
            border-right: 1px solid var(--border-color);
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-menu-header {
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .mobile-nav-links li {
            margin-bottom: 20px;
        }

        .mobile-nav-links a {
            font-weight: 600;
            font-size: 16px;
            display: block;
            color: var(--text-main);
        }

        .close-menu-btn {
            font-size: 24px;
        }

        /* --- AUTH REDESIGN (Split Layout) --- */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .auth-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            min-height: 500px;
            animation: fadeIn 0.6s ease-out;
        }

        .auth-form-side {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-image-side {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1588195538326-c5f1f9c496e0?q=80&w=2670&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 40px;
        }

        .auth-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .auth-image-text {
            position: relative;
            color: white;
            z-index: 2;
            text-align: center;
        }

        .auth-image-text h3 {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .auth-image-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: var(--color-black);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .btn-auth:hover {
            background: #333;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .back-link i {
            margin-right: 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer */
        footer {
            background-color: var(--bg-footer);
            color: var(--color-white);
            padding: 60px 0 20px 0;
            position: relative;
            overflow: hidden;
            border-radius: 30px 30px 0 0;
            margin-top: auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 30px;
        }

        .footer-col h4 {
            color: #f59e0b;
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .footer-col p,
        .footer-col a {
            font-size: 13px;
            line-height: 2;
            color: #cccccc;
            display: block;
        }

        .footer-socials {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .footer-socials a {
            color: #ffffff;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .footer-socials a:hover {
            color: var(--color-accent);
        }

        .footer-large-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-heading);
            font-size: 150px;
            font-style: italic;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 1024px) {

            .nav-links,
            .search-box input {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .search-box .fa-search {
                position: static;
                pointer-events: auto;
                font-size: 20px;
                margin-left: 5px;
            }
        }

        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .footer-socials {
                justify-content: center;
            }

            .footer-large-text {
                font-size: 100px;
                bottom: -20px;
            }

            /* Auth Mobile */
            .auth-container {
                flex-direction: column-reverse;
                max-width: 450px;
                min-height: auto;
            }

            .auth-image-side {
                height: 150px;
                padding: 20px;
                flex: none;
            }

            .auth-image-text h3 {
                font-size: 20px;
            }

            .auth-image-text p {
                display: none;
            }

            .auth-form-side {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>


    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay"></div>
    <div class="mobile-menu">
        <div class="mobile-menu-header flex justify-between align-center">
            <span class="logo font-heading">KICKSLAB</span>
            <button class="close-menu-btn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="Landingpage.html">Home</a></li>
            <li><a href="ProductListing.html">Shop</a></li>
            <li><a href="AboutPage.html">About</a></li>
            <li><a href="Contact.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </div>

    <main class="auth-wrapper">
        <div class="auth-container">
            <!-- Form Side -->
            <div class="auth-form-side">
                <div class="icon-circle"
                    style="background: #e3f2fd; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; color: var(--color-accent); font-size: 24px;">
                    <i class="fas fa-lock"></i>
                </div>
                <h1 class="auth-title" style="text-align: center;">FORGOT PASSWORD?</h1>
                <p class="auth-subtitle" style="text-align: center;">No worries! Enter your email address below and
                    we'll send you a code to reset your password.</p>

                <form id="forgotForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
                    </div>
                    <button type="submit" class="btn-auth">Send Confirmation Code</button>
                </form>

                <div style="text-align: center;">
                    <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>

            <!-- Image Side -->
            <div class="auth-image-side">
                <div class="auth-image-overlay"></div>
                <div class="auth-image-text">
                    <h3>Secure Account</h3>
                    <p>We take your security seriously. Recover your access in seconds.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                document.getElementById("email").value = emailParam;
            }
        });

        document.getElementById("forgotForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;

            const res = await fetch("/api/users/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.message);
                return;
            }
            localStorage.setItem("verifyEmail", email);

            localStorage.setItem("otpPurpose", "forgot_password");

            window.location.href = "/user/otp-verification.html";

        });
    </script>

</body>

</html>
