<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | KICKSLAB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@700&display=swap');

        :root {
            --primary: #000000;
            --accent: #4f46e5;
            --text-muted: #6b7280;
            --bg: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #000 30%, #444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: -1rem;
            opacity: 0.05;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            user-select: none;
        }

        .icon-box {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 2rem;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        p {
            color: var(--text-muted);
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            background: #1a1a1a;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* Decorative Background Elements */
        .circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -2;
            border-radius: 50%;
        }

        .circle-1 {
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            bottom: -100px;
            left: -100px;
        }
    </style>
</head>

<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="container">
        <div class="error-code">404</div>
        <div class="icon-box">
            <i class="fas fa-ghost"></i>
        </div>
        <h1>Lost in the Kickslab?</h1>
        <p>The page you're searching for seems to have vanished into thin air. Let's get you back on steady ground.</p>
        <a href="/user" class="btn">
            <i class="fas fa-arrow-left"></i>
            Back to Homepage
        </a>
    </div>

    <script>
        // Smooth entry animation
        document.querySelector('.container').style.opacity = '0';
        document.querySelector('.container').style.transform = 'translateY(20px)';

        window.onload = () => {
            setTimeout(() => {
                const container = document.querySelector('.container');
                container.style.transition = 'all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1)';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        };
    </script>
</body>

</html>
